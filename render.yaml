services:
  - type: web
    name: zomato-recommendation-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.phase_6.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: GROQ_API_KEY
        sync: false
      - key: HF_TOKEN
        sync: false
      - key: ALLOWED_ORIGINS
        value: "https://*.vercel.app,http://localhost:3000,http://127.0.0.1:3000"
      - key: VERCEL_ORIGIN_REGEX
        value: "https://.*\.vercel\.app"
